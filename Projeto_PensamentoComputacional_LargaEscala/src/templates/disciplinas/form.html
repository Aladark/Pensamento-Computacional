{% extends "base.html" %}
{% block title %}Nova Disciplina - PAI{% endblock %}
{% block page_title %}Nova Disciplina{% endblock %}
{% block content %}
<div class="row justify-content-center">
<div class="col-md-8">
<div class="card">
    <div class="card-header bg-white py-3">
        <i class="bi bi-plus-circle-fill text-primary me-2"></i>Cadastrar Nova Disciplina
    </div>
    <div class="card-body p-4">
        <form method="POST">
            <div class="row g-3">
                <div class="col-md-8">
                    <label class="form-label fw-semibold">Nome da Disciplina *</label>
                    <input type="text" name="nome" class="form-control" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-semibold">Código *</label>
                    <input type="text" name="codigo" class="form-control" placeholder="EX: MAT001" required>
                </div>
                <div class="col-md-8">
                    <label class="form-label fw-semibold">Professor Responsável</label>
                    <select name="professor_id" class="form-select">
                        <option value="">Selecione...</option>
                        {% for p in professores %}
                        <option value="{{ p.id }}">{{ p.nome }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-semibold">Carga Horária (horas)</label>
                    <input type="number" name="carga_horaria" class="form-control" value="60" min="1">
                </div>
                <div class="col-12">
                    <label class="form-label fw-semibold">Descrição</label>
                    <textarea name="descricao" class="form-control" rows="3"></textarea>
                </div>
            </div>
            <div class="d-flex gap-2 mt-4">
                <button type="submit" class="btn btn-primary px-4">Salvar Disciplina</button>
                <a href="{{ url_for('disciplinas.listar') }}" class="btn btn-outline-secondary px-4">Cancelar</a>
            </div>
        </form>
    </div>
</div>
</div>
</div>
{% endblock %}
