{% extends "base.html" %}
{% block title %}Editar Nota - PAI{% endblock %}
{% block page_title %}Editar Nota{% endblock %}
{% block content %}
<div class="row justify-content-center">
<div class="col-md-8">
<div class="card">
    <div class="card-header bg-white py-3"><i class="bi bi-pencil-fill text-warning me-2"></i>Editar Nota</div>
    <div class="card-body p-4">
        <div class="mb-3 p-3 bg-light rounded">
            <strong>Aluno:</strong> {{ nota.aluno.nome }} &nbsp;|&nbsp;
            <strong>Disciplina:</strong> {{ nota.disciplina.nome }}
        </div>
        <form method="POST">
            <div class="row g-3">
                <div class="col-md-3">
                    <label class="form-label fw-semibold">Nota P1</label>
                    <input type="number" name="nota_p1" class="form-control" min="0" max="10" step="0.1" value="{{ nota.nota_p1 or '' }}">
                </div>
                <div class="col-md-3">
                    <label class="form-label fw-semibold">Nota P2</label>
                    <input type="number" name="nota_p2" class="form-control" min="0" max="10" step="0.1" value="{{ nota.nota_p2 or '' }}">
                </div>
                <div class="col-md-3">
                    <label class="form-label fw-semibold">Nota P3</label>
                    <input type="number" name="nota_p3" class="form-control" min="0" max="10" step="0.1" value="{{ nota.nota_p3 or '' }}">
                </div>
                <div class="col-md-3">
                    <label class="form-label fw-semibold">Frequência (%)</label>
                    <input type="number" name="frequencia" class="form-control" min="0" max="100" step="0.1" value="{{ nota.frequencia }}">
                </div>
            </div>
            <div class="d-flex gap-2 mt-4">
                <button type="submit" class="btn btn-warning px-4">Atualizar</button>
                <a href="{{ url_for('notas.listar') }}" class="btn btn-outline-secondary px-4">Cancelar</a>
            </div>
        </form>
    </div>
</div>
</div>
</div>
{% endblock %}
